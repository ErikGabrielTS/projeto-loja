<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro - OldGen Store</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css"
      integrity="sha512-NmLkDIU1C/C88wi324HBc+S2kLhi08PN5GDeUVVVC/BVt/9Izdsc9SVeVfA1UZbY3sHUlDSyRXhCzHfr6hmPPw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="shortcut icon"
      href="/images/icons/logo.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="/css/pages/cadastro.css" />
  </head>
  <body>
    <header id="header">
      <div id="container__logo">
        <a href="/index.html">
          <img src="/images/icons/logo.png" alt="OldGen Store" class="logo" />
        </a>
      </div>

      <nav id="menu">
        <ul>
          <li>
            <a href="/index.html" class="item__menu">Home</a>
          </li>
          <li>
            <a href="/pages/cadastro.html" class="item__menu">Cadastro</a>
          </li>
          <li>
            <a href="/pages/sobre.html" class="item__menu">Sobre</a>
          </li>
        </ul>
      </nav>

      <div class="container__icons">
        <ul>
          <li>
            <a href="/pages/login.html" class="item__icon">
              <img src="/images/icons/login.png" alt="Login" class="icon" />
            </a>
          </li>

          <li>
            <a href="/pages/carrinho.html" class="item__icon">
              <img
                src="/images/icons/carrinho.png"
                alt="Carrinho"
                class="icon"
              />
            </a>
          </li>
        </ul>
      </div>
    </header>

    <main>
      <div class="container__cadastro">
        <div class="container__title">
          <h2 class="cadastro__title">CRIAR NOVA CONTA</h2>
          <p class="cadastro__subtitle">
            Preencha seus dados abaixo para se cadastrar
          </p>
        </div>

        <section class="cadastro__form-section">
          <form id="form-cadastro" class="cadastro__form">
            <div class="form__group">
              <label for="nome">Nome Completo</label>
              <input
                type="text"
                id="nome"
                name="nome"
                placeholder="Digite seu nome completo"
                required
              />
            </div>

            <div class="form__group">
              <label for="email">E-mail</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="seuemail@exemplo.com"
                required
              />
            </div>

            <div class="form__group">
              <label for="cpf">CPF</label>
              <input
                type="text"
                id="cpf"
                name="cpf"
                placeholder="000.000.000-00"
                required
              />
            </div>

            <div class="form__group">
              <label for="telefone">Telefone</label>
              <input
                type="tel"
                id="telefone"
                name="telefone"
                placeholder="(00) 00000-0000"
                required
              />
            </div>

            <div class="form__group">
              <label for="nascimento">Data de Nascimento</label>
              <input type="date" id="nascimento" name="nascimento" required />
            </div>

            <div class="form__group">
              <label for="senha">Senha</label>
              <input
                type="password"
                id="senha"
                name="senha"
                placeholder="Digite sua senha"
                required
              />
            </div>

            <div class="form__group">
              <label for="confirmar-senha">Confirmar Senha</label>
              <input
                type="password"
                id="confirmar-senha"
                name="confirmar-senha"
                placeholder="Confirme sua senha"
                required
              />
            </div>

            <div class="form__group form__group--checkbox">
              <input type="checkbox" id="newsletter" name="newsletter" />
              <label for="newsletter"
                >Desejo receber novidades e ofertas por e-mail.</label
              >
            </div>

            <div class="cadastro__actions">
              <button type="submit" class="btn__cadastrar">CADASTRAR-SE</button>

              <p class="cadastro__login-link">
                Já possui conta? <a href="/pages/login.html">Faça login</a>.
              </p>
            </div>
          </form>
        </section>
      </div>
    </main>

    <footer class="footer">
      <div class="container__address container">
        <h3>Endereço</h3>
        <p>Rua Exemplo, 123, Ponto Novo - Aracaju/SE</p>
      </div>

      <div class="container__links container">
        <h3>Links Úteis</h3>

        <ul>
          <li><a href="/pages/contato.html">Contato</a></li>
          <li><a href="/pages/faq.html">FAQ</a></li>
          <li><a href="/pages/trocas.html">Trocas</a></li>
          <li><a href="/pages/sobre.html">Sobre Nós</a></li>
        </ul>
      </div>

      <div class="container__social container">
        <h3>Redes Sociais</h3>
        <ul>
          <li>
            <a href="https://www.facebook.com" target="_blank">
              <img
                src="/images/icons/facebook.png"
                alt="Facebook"
                class="social__icon"
              />
            </a>
          </li>
          <li>
            <a href="https://www.twitter.com" target="_blank">
              <img
                src="/images/icons/x.png"
                alt="Twitter"
                class="social__icon"
              />
            </a>
          </li>
          <li>
            <a href="https://www.instagram.com" target="_blank">
              <img
                src="/images/icons/instagram.png"
                alt="Instagram"
                class="social__icon"
              />
            </a>
          </li>
        </ul>
      </div>

      <div class="container__payment container">
        <h3>Aceitamos Pagamentos</h3>

        <ul>
          <li>
            <img
              src="/images/icons/visa.png"
              alt="Visa"
              class="payment__icon"
            />
          </li>

          <li>
            <img
              src="/images/icons/visa.png"
              alt="Visa"
              class="payment__icon"
            />
          </li>
          <li>
            <img
              src="/images/icons/visa.png"
              alt="Visa"
              class="payment__icon"
            />
          </li>
        </ul>
      </div>
    </footer>
  </body>
</html>
