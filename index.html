<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OldGen Store</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css"
      integrity="sha512-NmLkDIU1C/C88wi324HBc+S2kLhi08PN5GDeUVVVC/BVt/9Izdsc9SVeVfA1UZbY3sHUlDSyRXhCzHfr6hmPPw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="shortcut icon"
      href="/images/icons/logo.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="css/global.css" />
    <script type="module" src="/js/lista_produtos.js" defer></script>
  </head>
  <body>
    <header id="header">
      <div id="container__logo">
        <a href="index.html">
          <img src="/images/icons/logo.png" alt="OldGen Store" class="logo" />
        </a>
      </div>

      <nav id="menu">
        <ul>
          <li>
            <a href="index.html" class="item__menu">Home</a>
          </li>
          <li>
            <a href="pages/cadastro.html" class="item__menu">Cadastro</a>
          </li>
          <li>
            <a href="pages/sobre.html" class="item__menu">Sobre</a>
          </li>
        </ul>
      </nav>

      <div class="container__icons">
        <ul>
          <li>
            <a href="/pages/login.html" class="item__icon">
              <img src="/images/icons/login.png" alt="Login" class="icon" />
            </a>
          </li>

          <li>
            <a href="/pages/carrinho.html" class="item__icon">
              <img
                src="/images/icons/carrinho.png"
                alt="Carrinho"
                class="icon"
              />
            </a>
          </li>
        </ul>
      </div>
    </header>

    <main class="main">
      <section>
        <ul class="categories"></ul>
      </section>

      <section class="search">
        <input type="text" name="pesquisa" placeholder="Busque o seu produto" />
      </section>

      <section class="wrapper__products">
        <!-- <div class="card__product">
          <img src="/images/3DS.png" alt="Nintendo 3DS" />

          <div class="card__content">
            <h4>Nintendo 3DS</h4>
            <span>R$ 1.299,99</span>
            <button class="btn__card">Adicionar ao Carrinho</button>
          </div>
        </div> -->
      </section>
    </main>

    <footer class="footer">
      <div class="container__address container">
        <h3>Endereço</h3>
        <p>Rua Exemplo, 123, Ponto Novo - Aracaju/SE</p>
      </div>

      <div class="container__links container">
        <h3>Links Úteis</h3>

        <ul>
          <li><a href="/pages/contato.html">Contato</a></li>
          <li><a href="/pages/faq.html">FAQ</a></li>
          <li><a href="/pages/trocas.html">Trocas</a></li>
          <li><a href="/pages/sobre.html">Sobre Nós</a></li>
        </ul>
      </div>

      <div class="container__social container">
        <h3>Redes Sociais</h3>
        <ul>
          <li>
            <a href="https://www.facebook.com" target="_blank">
              <img
                src="images/icons/facebook.png"
                alt="Facebook"
                class="social__icon"
              />
            </a>
          </li>
          <li>
            <a href="https://www.twitter.com" target="_blank">
              <img
                src="images/icons/x.png"
                alt="Twitter"
                class="social__icon"
              />
            </a>
          </li>
          <li>
            <a href="https://www.instagram.com" target="_blank">
              <img
                src="images/icons/instagram.png"
                alt="Instagram"
                class="social__icon"
              />
            </a>
          </li>
        </ul>
      </div>

      <div class="container__payment container">
        <h3>Aceitamos Pagamentos</h3>

        <ul>
          <li>
            <img
              src="/images/icons/visa.png"
              alt="Visa"
              class="payment__icon"
            />
          </li>

          <li>
            <img
              src="/images/icons/visa.png"
              alt="Visa"
              class="payment__icon"
            />
          </li>
          <li>
            <img
              src="/images/icons/visa.png"
              alt="Visa"
              class="payment__icon"
            />
          </li>
        </ul>
      </div>
    </footer>
  </body>
</html>
