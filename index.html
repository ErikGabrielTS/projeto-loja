<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OldGen Store</title>
    <link rel="shortcut icon" href="/images/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <header>
      <div id="container__logo">
        <a href="index.html">
          <img src="/images/icons/logo.png" alt="OldGen Store" />
        </a>
      </div>

      <nav id="menu">
        <ul>
          <li>
            <a href="index.html" class="item__menu">Home</a>
          </li>
          <li>
            <a href="pages/cadastro.html" class="item__menu">Cadastro</a>
          </li>
          <li>
            <a href="pages/sobre.html" class="item__menu">Sobre</a>
          </li>
        </ul>
      </nav>

      <div id="container_icons">
        <ul>
          <li>
            <a href="/pages/login.html" class="item__icon">
              <img src="/images/icons/login.png" alt="Login" />
            </a>
          </li>

          <li>
            <a href="/pages/carrinho.html" class="item__icon">
              <img src="/images/icons/carrinho.png" alt="Carrinho" />
            </a>
          </li>
        </ul>
      </div>
    </header>

    <main>
      <section id="search">
        <input type="text" name="pesquisa" placeholder="Busque o seu produto" />
      </section>

      <section>
        <div>
          <img src="/images/3DS.png" alt="Nintendo 3DS" />
          <h3>Nintendo 3DS</h3>
          <span>R$ 1.299,99</span>
          <button class="btn__card">Adicionar</button>
        </div>
      </section>
    </main>

    <footer>
      <div id="container__payment">
        <ul>
          <li>
            <img src="/images/icons/pix.png" alt="Pix" />
          </li>
          <li>
            <img src="/images/icons/master_card.png" alt="Master Card" />
          </li>
          <li>
            <img src="/images/icons/visa.png" alt="Visa" />
          </li>
          <li>
            <img src="/images/icons/hipercard.png" alt="Hipercard" />
          </li>
        </ul>
      </div>
    </footer>
  </body>
</html>
